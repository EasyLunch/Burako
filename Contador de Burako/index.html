<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Burako">
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Burako</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111827;--bg2:#1f2937;--bg3:#374151;--bg4:#4b5563;
  --text:#f9fafb;--dim:#9ca3af;
  --blue:#2563eb;--green:#059669;--red:#dc2626;--amber:#d97706;
  --r:13px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased;font-size:16px;}
#app{height:100vh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;}

/* ── layout ── */
.topbar{display:flex;align-items:center;gap:10px;background:var(--bg2);
  padding:12px 16px;border-bottom:1px solid var(--bg3);flex-shrink:0;}
.topbar h2{font-size:1rem;font-weight:700;}
.sub{font-size:.72rem;color:var(--dim);margin-top:1px;}
.back{background:none;color:var(--dim);font-size:1.4rem;padding:2px 8px 2px 0;border:none;cursor:pointer;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;}
.bar{flex-shrink:0;background:var(--bg);border-top:1px solid var(--bg3);
  padding:12px 14px;padding-bottom:max(12px,env(safe-area-inset-bottom));}

/* ── card ── */
.card{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.ctitle{font-size:.75rem;font-weight:600;color:#60a5fa;margin-bottom:10px;letter-spacing:.03em;}

/* ── buttons ── */
.btn{display:block;width:100%;padding:14px;border-radius:var(--r);font-size:.95rem;
  font-weight:600;text-align:center;border:none;cursor:pointer;transition:filter .12s;margin-bottom:8px;}
.btn:last-child{margin-bottom:0;}
.btn:active{filter:brightness(.8);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-gray{background:var(--bg3);color:var(--text);}
.btn-link{background:transparent;color:var(--dim);text-decoration:underline;
  padding:8px;font-weight:400;font-size:.85rem;}
.btn-sm{padding:10px 12px;font-size:.85rem;}
.btn-icon{background:var(--bg3);border:none;cursor:pointer;border-radius:9px;
  padding:10px 14px;color:var(--text);font-size:.85rem;white-space:nowrap;}

/* ── inputs ── */
input[type=text],input[type=password],input[type=number],select{
  display:block;width:100%;background:var(--bg3);color:var(--text);
  border:none;border-radius:10px;padding:11px 13px;font-size:.95rem;outline:none;}
input:focus,select:focus{outline:2px solid var(--blue);}
input[type=file]{display:none!important;}
input[type=checkbox]{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;}
.lbl{display:block;font-size:.75rem;color:var(--dim);margin-bottom:4px;margin-top:10px;}

/* ── counter ── */
.ctr{display:flex;align-items:center;gap:10px;padding:4px 0;}
.cb{width:38px;height:38px;border-radius:50%;background:var(--bg3);
  color:var(--text);font-size:1.3rem;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cb:active{filter:brightness(.75);}
.cv{font-size:1.35rem;font-weight:700;min-width:32px;text-align:center;}
.cl{flex:1;font-size:.88rem;line-height:1.3;}
.cl .small{font-size:.72rem;color:var(--dim);}

/* ── toggle ── */
.tog{display:flex;align-items:center;gap:10px;padding:5px 0;cursor:pointer;}
.tog label{flex:1;font-size:.88rem;cursor:pointer;}

/* ── score table ── */
table{width:100%;border-collapse:collapse;}
th,td{padding:9px 10px;text-align:left;}
thead tr{background:var(--bg);}
tbody tr{border-top:1px solid var(--bg3);}
th{font-size:.72rem;color:var(--dim);font-weight:500;}
.tc{text-align:center;}
.win td{color:#fbbf24!important;}
.win{background:#1c1505;}

/* ── progress ── */
.pdots{display:flex;gap:5px;align-items:center;}
.pd{width:7px;height:7px;border-radius:50%;background:var(--bg3);transition:all .2s;}
.pd.cur{width:11px;height:11px;background:var(--blue);}
.pd.done{background:var(--green);}

/* ── result rows ── */
.rr{display:flex;justify-content:space-between;align-items:center;
  padding:11px 13px;border-radius:10px;margin-bottom:6px;}
.rr-pos{background:#052e16;border:1px solid #065f46;}
.rr-amb{background:#431407;border:1px solid var(--amber);}
.rr-blu{background:#082f49;border:1px solid #0369a1;}
.rr-neg{background:#2d1515;border:1px solid var(--red);}
.rr-tot{background:var(--bg2);margin-top:4px;}

/* ── misc ── */
.row{display:flex;gap:8px;align-items:center;}
.btw{justify-content:space-between;}
.f1{flex:1;}
.bold{font-weight:700;}
.big{font-size:1.35rem;}
.dim{color:var(--dim);}
.green{color:#34d399;}
.red{color:#f87171;}
.amber{color:#fbbf24;}
.center{text-align:center;}
.hint{font-size:.75rem;color:var(--dim);line-height:1.4;margin-bottom:6px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.chip{background:var(--bg3);border:none;color:var(--dim);border-radius:20px;
  padding:5px 12px;font-size:.78rem;cursor:pointer;white-space:nowrap;}
.chip:active{background:var(--bg4);color:var(--text);}
.err{background:#2d1515;border:1px solid var(--red);border-radius:10px;
  padding:11px;font-size:.82rem;color:#fca5a5;margin-top:10px;}

/* ── photo ── */
.photo-box{width:100%;max-height:300px;object-fit:contain;border-radius:10px;
  display:block;background:#080808;margin-bottom:10px;}

/* ── loading ── */
.loading{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px;text-align:center;}
@keyframes bd{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
.dots{display:flex;gap:8px;margin-top:20px;justify-content:center;}
.dot{width:11px;height:11px;background:var(--blue);border-radius:50%;
  animation:bd 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════
//  SCORING
// ══════════════════════════════════════
const TV={1:15,2:20,3:5,4:5,5:5,6:5,7:5,8:10,9:10,10:10,11:10,12:10,13:10};

function calcScore(f){
  // f = {limpias, sucias, fichas_en_juego, fichas_en_mano, salio, muertos}
  // If zero canastas → everything counts against
  if(f.limpias===0 && f.sucias===0){
    return -(f.fichas_en_juego + f.muertos*100 + f.fichas_en_mano);
  }
  const base = f.limpias*200 + f.sucias*100;
  const bonus = f.salio ? 100 : 0;
  return base + f.fichas_en_juego + bonus - f.muertos*100 - f.fichas_en_mano;
}

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let S={
  screen:'home',
  apiKey: localStorage.getItem('bk_key')||'',
  model:  localStorage.getItem('bk_model')||'claude-sonnet-4-6',
  // game config
  players:[],   // [{name}]
  target:2500,  // puntaje objetivo
  hands:[],     // [[{pidx,total,snap}]]
  // current hand
  hand:[],
  pidx:0,
  form:null,    // live form {limpias,sucias,fichas_en_juego,fichas_en_mano,salio,muertos}
  snap:null,    // frozen copy for result screen
  // photo
  photo:null,
  photoNotes:'',
  loading:false,
  error:null,
};

// Restore saved game
try{
  const g=JSON.parse(localStorage.getItem('bk_game')||'null');
  if(g?.players?.length){
    S.players=g.players; S.hands=g.hands||[];
    S.target=g.target||2500; S.screen='game';
  }
}catch(_){}

function save(){
  try{
    localStorage.setItem('bk_key', S.apiKey);
    localStorage.setItem('bk_model', S.model);
    localStorage.setItem('bk_game', JSON.stringify({
      players:S.players, hands:S.hands, target:S.target
    }));
  }catch(_){}
}

function loadNames(){
  try{return JSON.parse(localStorage.getItem('bk_names')||'[]');}catch(_){return[];}
}
function saveNames(names){
  try{
    const prev=loadNames();
    const merged=[...new Set([...names,...prev])].filter(Boolean).slice(0,20);
    localStorage.setItem('bk_names',JSON.stringify(merged));
  }catch(_){}
}
// Global: called from chip onclick
function pickName(i,name){
  const el=document.getElementById('p'+i);
  if(el){el.value=name;}
}

function totals(){
  return S.players.map((_,i)=>
    S.hands.reduce((s,h)=>s+(h.find(r=>r.pidx===i)?.total??0),0));
}

function blankForm(){
  return {limpias:0,sucias:0,fichas_en_juego:0,fichas_en_mano:0,salio:false,muertos:0};
}

// ══════════════════════════════════════
//  RENDER
// ══════════════════════════════════════
function render(){
  try{
    const MAP={home,newgame,settings,game,entry,result,winner};
    document.getElementById('app').innerHTML=MAP[S.screen]?.()||'';
    bind();
  }catch(e){
    document.getElementById('app').innerHTML=
      `<div style="padding:24px;color:#fca5a5"><b>Error:</b> ${e.message}<br><br>
       <button onclick="localStorage.clear();location.reload()"
         style="background:#374151;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer">
         Reiniciar</button></div>`;
  }
}

// ── HOME ────────────────────────────
function home(){
  const hasSaved = S.players.length>0;
  return `
  <div class="scroll" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%">
    <div class="center" style="width:100%;max-width:340px;padding:0 16px">
      <div style="font-size:4rem;margin-bottom:8px">🃏</div>
      <h1 style="font-size:2rem;font-weight:800;margin-bottom:4px">Burako</h1>
      <p class="dim" style="font-size:.85rem;margin-bottom:40px">Contador automático de puntos</p>

      <button id="goNew" class="btn btn-blue" style="font-size:1rem">Nueva partida</button>
      ${hasSaved?`<button id="goCont" class="btn btn-gray">Continuar (Mano ${S.hands.length+1})</button>`:''}
      <button id="goSettings" class="btn btn-link" style="margin-top:8px">⚙️ Configuración API</button>
    </div>
  </div>`;
}

// ── NEW GAME ─────────────────────────
function newgame(){
  const n=Math.max(S.players.length,2);
  const hist=loadNames();
  const pinputs=Array.from({length:n},(_,i)=>{
    const chips=hist.length
      ? `<div class="chips">${hist.map(nm=>`<button class="chip" onclick="pickName(${i},'${x(nm)}')">${x(nm)}</button>`).join('')}</div>`
      : '';
    return`
    <label class="lbl">Jugador ${i+1}</label>
    <input id="p${i}" type="text" value="${x(S.players[i]?.name||'')}"
      placeholder="Nombre del jugador ${i+1}" autocomplete="off">
    ${chips}`;
  }).join('');
  return `
  <div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">
    <div class="topbar">
      <button id="backHome" class="back">←</button>
      <h2>Nueva partida</h2>
    </div>
    <div class="scroll" style="flex:1;overflow-y:auto">
      <div class="card">
        <div class="ctitle">👥 Jugadores</div>
        <div class="row btw" style="margin-bottom:10px">
          <span class="hint" style="margin:0">Entre 2 y 4 jugadores</span>
          <div class="row" style="gap:6px">
            <button id="rmv" class="cb" style="width:32px;height:32px;font-size:1rem"
              ${n<=2?'disabled style="opacity:.35"':''}>−</button>
            <button id="add" class="cb" style="width:32px;height:32px;font-size:1rem"
              ${n>=4?'disabled style="opacity:.35"':''}>+</button>
          </div>
        </div>
        ${pinputs}
      </div>

      <div class="card">
        <div class="ctitle">🎯 Puntaje objetivo</div>
        <p class="hint">El primer jugador en alcanzar este puntaje gana la partida.</p>
        <input id="target" type="number" min="100" step="100" value="${S.target}" placeholder="3000">
      </div>

      <div style="height:8px"></div>
    </div>
    <div class="bar" style="flex-shrink:0">
      <button id="confirmNew" class="btn btn-blue">Empezar partida 🚀</button>
    </div>
  </div>`;
}

// ── SETTINGS ─────────────────────────
function settings(){
  const mopts=[
    ['claude-sonnet-4-6','Sonnet 4.6 — Recomendado'],
    ['claude-opus-4-8','Opus 4.8 — Más preciso'],
    ['claude-haiku-4-5-20251001','Haiku 4.5 — Más rápido'],
  ].map(([v,l])=>`<option value="${v}" ${S.model===v?'selected':''}>${l}</option>`).join('');
  return `
  <div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">
    <div class="topbar">
      <button id="backHome2" class="back">←</button>
      <h2>Configuración</h2>
    </div>
    <div class="scroll">
      <div class="card">
        <div class="ctitle">🔑 API Key de Anthropic</div>
        <p class="hint">Se usa para reconocer fichas en fotos. Gratis en <b>console.anthropic.com</b></p>
        <input id="apikey" type="password" placeholder="sk-ant-api03-..." value="${x(S.apiKey)}">
        <label class="lbl">Modelo</label>
        <select id="model">${mopts}</select>
      </div>
    </div>
    <div class="bar">
      <button id="saveSettings" class="btn btn-blue">Guardar</button>
    </div>
  </div>`;
}

// ── GAME ─────────────────────────────
function game(){
  const ts=totals();
  const mx=Math.max(...ts,0);
  const hn=S.hands.length;
  const hth=S.hands.map((_,i)=>`<th class="tc">M${i+1}</th>`).join('');
  const rows=S.players.map((p,i)=>{
    const win=ts[i]===mx&&mx>0;
    const near=ts[i]>=S.target*0.9;
    const cells=S.hands.map(h=>{
      const r=h.find(r=>r.pidx===i);
      if(!r)return`<td class="tc dim">−</td>`;
      return`<td class="tc ${r.total>=0?'green':'red'}"style="font-size:.78rem">${r.total>=0?'+':''}${r.total}</td>`;
    }).join('');
    return`<tr ${win?'class="win"':''}><td>${win?'👑 ':''}${x(p.name)}${near&&!win?` <span style="font-size:.7rem;color:var(--amber)">▲</span>`:''}</td>
      <td class="tc bold big">${ts[i].toLocaleString()}</td>${cells}</tr>`;
  }).join('');
  return`
  <div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">
    <div class="topbar" style="justify-content:space-between">
      <div><h2>🃏 Burako</h2><div class="sub">Mano ${hn+1} · Meta: ${S.target.toLocaleString()} pts</div></div>
      <button id="goHome" class="btn-icon">≡</button>
    </div>
    <div class="scroll" style="padding:0">
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Jugador</th><th class="tc">Total</th>${hth}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      ${hn===0?`<p class="dim center"style="padding:28px;font-size:.85rem">Sin manos jugadas todavía</p>`:''}
    </div>
    <div class="bar">
      <button id="startHand" class="btn btn-blue" style="margin-bottom:8px">📋 Cargar mano ${hn+1}</button>
      ${hn>0?`<button id="undoHand" class="btn btn-gray">↩️ Deshacer última mano</button>`:''}
    </div>
  </div>`;
}

// ── ENTRY ─────────────────────────────
function entry(){
  const f=S.form;
  const p=S.players[S.pidx];
  const n=S.players.length;
  const sub=calcScore(f);
  const sinCan=f.limpias===0&&f.sucias===0;
  const dots=S.players.map((_,i)=>`<div class="pd ${i===S.pidx?'cur':i<S.pidx?'done':''}"></div>`).join('');
  const hasPhoto=!!S.photo;

  if(S.loading) return`
  <div class="loading">
    <div style="font-size:3rem">🤖</div>
    <h2 style="margin-top:10px">Analizando canastas…</h2>
    <p class="dim"style="font-size:.85rem;margin-top:6px">Detectando canastas y contando fichas de <b>${x(p.name)}</b></p>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>`;

  return`
  <div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">
    <div class="topbar">
      <button id="backGame" class="back">←</button>
      <div class="f1"><h2>${x(p.name)}</h2><div class="sub">Jugador ${S.pidx+1} de ${n}</div></div>
      <div class="pdots">${dots}</div>
    </div>

    <div class="scroll">

      <!-- FOTO + CANASTAS -->
      <div class="card">
        <div class="row btw" style="margin-bottom:10px">
          <div class="ctitle" style="margin:0">📷 Canastas en juego</div>
          ${hasPhoto
            ? `<label for="photoTrig" style="font-size:.75rem;color:#60a5fa;cursor:pointer">📷 Retomar</label>`
            : `<label for="photoTrig" class="btn-icon" style="cursor:pointer;font-size:.8rem">📷 Fotografiar</label>`
          }
        </div>
        ${hasPhoto?`<img src="${S.photo}" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-bottom:10px">`:''}
        ${S.error?`<div class="err" style="margin-bottom:10px">⚠️ ${x(S.error)}</div>`:''}
        ${!hasPhoto?`<p class="hint" style="margin-bottom:10px">Fotografiá las canastas — la IA detecta limpias, sucias y el valor de fichas automáticamente.</p>`:''}
        <input type="file" id="photoTrig" accept="image/*" capture="environment">

        <div class="ctr" style="margin-bottom:10px">
          <button class="cb"id="lm">−</button>
          <span class="cv"id="lv">${f.limpias}</span>
          <button class="cb"id="lp">+</button>
          <div class="cl">Canastas limpias<br><span class="small">200 pts base cada una</span></div>
        </div>
        <div class="ctr" style="margin-bottom:10px">
          <button class="cb"id="sm">−</button>
          <span class="cv"id="sv">${f.sucias}</span>
          <button class="cb"id="sp">+</button>
          <div class="cl">Canastas sucias<br><span class="small">100 pts base cada una</span></div>
        </div>

        <label class="lbl">Valor total de fichas en las canastas</label>
        <input id="fj" type="number" min="0" value="${f.fichas_en_juego}" placeholder="0">
        ${S.photoNotes?`<p style="font-size:.72rem;color:var(--dim);margin-top:4px">${x(S.photoNotes)}</p>`:''}

        ${sinCan?`<div style="margin-top:10px;background:#2d1515;border:1px solid var(--red);border-radius:9px;padding:9px 11px;font-size:.8rem;color:#fca5a5">
          ⚠️ Sin canastas — todos los puntos serán negativos</div>`:''}
      </div>

      <!-- MUERTOS: 3 botones -->
      <div class="card">
        <div class="ctitle">💀 Muertos sin comprar</div>
        <div class="row" style="gap:8px">
          ${[0,1,2].map(v=>{
            const sel=f.muertos===v;
            return`<button id="mu${v}" style="flex:1;padding:14px 0;border-radius:10px;
              border:2px solid ${sel?'var(--red)':'var(--bg3)'};
              background:${sel?'#2d1515':'var(--bg3)'};
              color:${sel?'#fca5a5':'var(--text)'};
              font-size:1.1rem;font-weight:700;cursor:pointer">
              ${v===0?'0 ✓':v===1?'1 💀':'2 💀💀'}
            </button>`;
          }).join('')}
        </div>
        ${f.muertos>0?`<p style="font-size:.75rem;color:#f87171;margin-top:6px">−${f.muertos*100} pts</p>`:''}
      </div>

      <!-- EXTRAS -->
      <div class="card">
        <div class="tog">
          <input type="checkbox" id="salio" ${f.salio?'checked':''}>
          <label for="salio">🏅 Salió primero <span class="dim" style="font-size:.75rem">(+100 pts)</span></label>
        </div>
        <div style="margin-top:12px">
          <label class="lbl">❌ Fichas en mano (si no terminó)</label>
          <input id="fm" type="number" min="0" value="${f.fichas_en_mano}" placeholder="0">
        </div>
      </div>

      <!-- PREVIEW -->
      <div class="card" style="background:#161e2e;border:1px solid #2d3748">
        <div class="row btw">
          <span class="bold">Subtotal</span>
          <span class="bold big ${sub>=0?'green':'red'}"id="prev">${sub>=0?'+':''}${sub}</span>
        </div>
      </div>

      <div style="height:10px"></div>
    </div>

    <div class="bar">
      <button id="nextPlayer" class="btn btn-blue">
        ${S.pidx===n-1?'✅ Ver resultado':'➡️ Siguiente jugador'}
      </button>
    </div>
  </div>`;
}

// ── RESULT (per-player) ───────────────
function result(){
  const f=S.snap; // use frozen snapshot
  const p=S.players[S.pidx];
  const total=calcScore(f);
  const sinCan=f.limpias===0&&f.sucias===0;
  const isLast=S.pidx===S.players.length-1;
  const tc=total>=0?'green':'red';
  const rows=[];

  if(sinCan){
    if(f.fichas_en_juego>0) rows.push(rr('rr-neg',`Fichas en juego (sin canastas → resta)`,'red',`−${f.fichas_en_juego}`));
    if(f.muertos>0)         rows.push(rr('rr-neg',`${f.muertos} muerto${f.muertos>1?'s':''} sin comprar`,'red',`−${f.muertos*100}`));
    if(f.fichas_en_mano>0)  rows.push(rr('rr-neg','Fichas en mano','red',`−${f.fichas_en_mano}`));
    rows.push(rr('rr-neg','⚠️ Sin canastas — todo negativo','red',''));
  } else {
    if(f.limpias>0)         rows.push(rr('rr-pos',`${f.limpias} canasta${f.limpias>1?'s':''} limpia${f.limpias>1?'s':''}  (+${f.limpias*200} base)`,'green',`+${f.limpias*200}`));
    if(f.sucias>0)          rows.push(rr('rr-amb',`${f.sucias} canasta${f.sucias>1?'s':''} sucia${f.sucias>1?'s':''}  (+${f.sucias*100} base)`,'amber',`+${f.sucias*100}`));
    if(f.fichas_en_juego>0) rows.push(rr('','Fichas en el juego','',`+${f.fichas_en_juego}`,'background:#1a2535;border:1px solid #334155'));
    if(f.salio)             rows.push(rr('rr-blu','🏅 Salió primero','','+100',''));
    if(f.muertos>0)         rows.push(rr('rr-neg',`${f.muertos} muerto${f.muertos>1?'s':''} sin comprar`,'red',`−${f.muertos*100}`));
    if(f.fichas_en_mano>0)  rows.push(rr('rr-neg','Fichas en mano','red',`−${f.fichas_en_mano}`));
  }

  return`
  <div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">
    <div class="topbar">
      <button id="backEntry3" class="back">←</button>
      <div><h2>${x(p.name)}</h2><div class="sub">Resultado mano ${S.hands.length+1}</div></div>
    </div>
    <div class="scroll">
      ${rows.join('')}
      <div class="rr rr-tot row btw" style="margin-top:6px">
        <span class="bold">Total mano</span>
        <span class="bold big ${tc}">${total>=0?'+':''}${total}</span>
      </div>
      <div style="height:10px"></div>
    </div>
    <div class="bar">
      <div class="row" style="gap:8px;margin-bottom:${isLast?'0':'8px'}">
        <button id="editBack" class="btn btn-gray btn-sm f1" style="margin:0">✏️ Editar</button>
        <button id="confirmP" class="btn btn-blue btn-sm f1" style="margin:0">
          ${isLast?'✅ Terminar mano':'➡️ Siguiente'}
        </button>
      </div>
      ${!isLast?`<p class="dim center"style="font-size:.78rem;margin-top:6px">Siguiente: ${x(S.players[S.pidx+1]?.name)}</p>`:''}
    </div>
  </div>`;
}

function rr(cls,label,valCls,val,extraStyle=''){
  return`<div class="rr ${cls}" style="${extraStyle}">
    <span>${label}</span>
    ${val?`<span class="bold ${valCls}">${val}</span>`:''}
  </div>`;
}

// ── WINNER ────────────────────────────
function winner(){
  const ts=totals();
  const sorted=[...S.players.map((p,i)=>({name:p.name,pts:ts[i]}))].sort((a,b)=>b.pts-a.pts);
  const w=sorted[0];
  return`
  <div class="scroll"style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;text-align:center">
    <div style="padding:0 24px;max-width:360px;width:100%">
      <div style="font-size:4rem;margin-bottom:8px">🏆</div>
      <h1 style="font-size:1.6rem;font-weight:800;color:#fbbf24;margin-bottom:4px">¡${x(w.name)} ganó!</h1>
      <p class="dim"style="margin-bottom:24px">${w.pts.toLocaleString()} puntos · ${S.hands.length} manos jugadas</p>
      <div class="card" style="text-align:left;margin-bottom:24px">
        ${sorted.map((p,i)=>`
        <div class="row btw" style="padding:8px 0;${i>0?'border-top:1px solid var(--bg3)':''}">
          <span>${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''} ${x(p.name)}</span>
          <span class="bold">${p.pts.toLocaleString()}</span>
        </div>`).join('')}
      </div>
      <button id="goHome2" class="btn btn-blue">Nueva partida</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════
//  BIND
// ══════════════════════════════════════
function bind(){
  // HOME
  on('goNew',()=>{S.screen='newgame';render();});
  on('goCont',()=>{S.screen='game';render();});
  on('goSettings',()=>{S.screen='settings';render();});
  on('goHome',()=>{S.screen='home';render();});
  on('goHome2',()=>{S.players=[];S.hands=[];localStorage.removeItem('bk_game');S.screen='home';render();});

  // NEW GAME
  on('backHome',()=>{S.screen='home';render();});
  on('add',()=>{const n=pnames();if(n.length<4)n.push('');S.players=n.map(v=>({name:v}));render();});
  on('rmv',()=>{const n=pnames();if(n.length>2)n.pop();S.players=n.map(v=>({name:v}));render();});
  on('confirmNew',()=>{
    const names=pnames();
    if(!names.length||names.every(n=>!n)){alert('Ingresá al menos un nombre');return;}
    S.players=names.map(n=>({name:n||'Jugador'}));
    S.target=Math.max(100, parseInt(document.getElementById('target')?.value)||2500);
    saveNames(names);
    S.hands=[];
    S.screen='game';
    save();render();
  });

  // SETTINGS
  on('backHome2',()=>{S.screen='home';render();});
  on('saveSettings',()=>{
    S.apiKey=v('apikey')||S.apiKey;
    S.model=v('model')||S.model;
    save();S.screen='home';render();
  });

  // GAME
  on('startHand',()=>{
    S.pidx=0;S.hand=[];
    S.form=blankForm();S.snap=null;
    S.photo=null;S.photoNotes='';S.error=null;
    S.screen='entry';render();
  });
  on('undoHand',()=>{
    if(S.hands.length>0&&confirm('¿Deshacer la última mano?')){
      S.hands.pop();save();render();
    }
  });

  // ENTRY
  on('backGame',()=>{S.screen='game';render();});

  // canasta counters
  [['lm','limpias',-1],['lp','limpias',1],
   ['sm','sucias',-1], ['sp','sucias',1],
  ].forEach(([id,field,d])=> on(id,()=>{adj(field,d);preview();}));

  // muertos: 3 buttons
  [0,1,2].forEach(v=> on(`mu${v}`,()=>{S.form.muertos=v;render();}));

  // inputs
  ['fj','fm'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.oninput=()=>{syncNums();preview();};
  });
  const salEl=document.getElementById('salio');
  if(salEl) salEl.onchange=()=>{S.form.salio=salEl.checked;preview();};

  // photo trigger inline — analyze immediately after capture
  bindFile('photoTrig',(url)=>{S.photo=url;analyzePhoto();});

  on('nextPlayer',()=>{
    syncAll();
    S.snap={...S.form};
    S.screen='result';render();
  });
  bindFile('camIn',(url)=>{S.photo=url;S.error=null;render();});
  bindFile('galIn',(url)=>{S.photo=url;S.error=null;render();});

  // RESULT
  on('backEntry3',()=>{S.screen='entry';render();});
  on('editBack',()=>{S.screen='entry';render();});
  on('confirmP',()=>{
    const total=calcScore(S.snap);
    S.hand.push({pidx:S.pidx,total,snap:{...S.snap}});

    if(S.pidx===S.players.length-1){
      // hand complete
      S.hands.push(S.hand);
      save();
      // check winner
      const ts=totals();
      const wonIdx=ts.findIndex(t=>t>=S.target);
      if(wonIdx>=0){S.screen='winner';}
      else{S.screen='game';}
    } else {
      S.pidx++;
      S.form=blankForm();S.snap=null;
      S.photo=null;S.error=null;
      S.screen='entry';
    }
    render();
  });
}

// ══════════════════════════════════════
//  FORM HELPERS
// ══════════════════════════════════════
function adj(field,delta){
  if(!S.form)return;
  S.form[field]=Math.max(0,(S.form[field]||0)+delta);
  const idMap={limpias:'lv',sucias:'sv',muertos:'mv'};
  const el=document.getElementById(idMap[field]);
  if(el) el.textContent=S.form[field];
}
function syncNums(){
  if(!S.form)return;
  S.form.fichas_en_juego=Math.max(0,+v('fj')||0);
  S.form.fichas_en_mano =Math.max(0,+v('fm')||0);
}
function syncAll(){
  syncNums();
  const s=document.getElementById('salio');
  if(s) S.form.salio=s.checked;
}
function preview(){
  syncNums();
  const el=document.getElementById('prev');
  if(!el)return;
  const val=calcScore(S.form);
  el.textContent=(val>=0?'+':'')+val;
  el.className=`bold big ${val>=0?'green':'red'}`;
  // also show/hide sin canastas warning dynamically
  // (full re-render only on counter change to show the warning banner)
  if(S.form.limpias===0&&S.form.sucias===0){
    const card=document.querySelector('#lv')?.closest('.card');
    let warn=document.getElementById('sincanwarn');
    if(!warn&&card){
      warn=document.createElement('div');
      warn.id='sincanwarn';
      warn.style.cssText='margin-top:10px;background:#2d1515;border:1px solid var(--red);border-radius:9px;padding:9px 11px;font-size:.8rem;color:#fca5a5';
      warn.textContent='⚠️ Sin canastas — todos los puntos serán negativos';
      card.appendChild(warn);
    }
  } else {
    document.getElementById('sincanwarn')?.remove();
  }
}

// ══════════════════════════════════════
//  FILE / COMPRESS
// ══════════════════════════════════════
function bindFile(id,cb){
  const el=document.getElementById(id);
  if(!el)return;
  el.onchange=e=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>compress(ev.target.result,1200,.85,cb);
    reader.readAsDataURL(file);
    el.value='';
  };
}
function compress(dataUrl,maxDim,q,cb){
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    let [w,h]=[img.width,img.height];
    if(w>maxDim||h>maxDim){if(w>=h){h=Math.round(h*maxDim/w);w=maxDim;}else{w=Math.round(w*maxDim/h);h=maxDim;}}
    c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',q));
  };
  img.src=dataUrl;
}

// ══════════════════════════════════════
//  CLAUDE API
// ══════════════════════════════════════
async function analyzePhoto(){
  if(!S.apiKey){alert('Ingresá tu API key en Configuración.');return;}
  S.loading=true;S.error=null;render();

  const [,mime,b64]=S.photo.match(/^data:([^;]+);base64,(.+)$/);

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':S.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1024,
        tools:[{
          name:'registrar_fichas',
          description:`Registra el conteo de fichas de Burako de la foto.

Una CANASTA es un grupo de 7 o mas fichas que forman UNA DE ESTAS DOS COSAS:
1. PIERNA: 7+ fichas con el mismo numero (ej: siete 9s)
2. ESCALERA: 7+ fichas de numeros consecutivos del mismo color (ej: 5-6-7-8-9-10-11 todos negros)

El numero 2 puede usarse como comodin en cualquiera de los dos casos.
Canasta LIMPIA: sin comodin ni 2 de diferente color/usado como comodin
Canasta SUCIA: tiene comodin (ficha con dibujo) o 2 de diferente color usado como comodin
Menos de 7 fichas = NO es canasta.`,
          input_schema:{
            type:'object',
            properties:{
              limpias:{type:'integer',description:'Cantidad de canastas limpias (piernas o escaleras de 7+ fichas sin comodin ni 2 comodin)'},
              sucias:{type:'integer',description:'Cantidad de canastas sucias (piernas o escaleras de 7+ fichas CON comodin o 2 usado como comodin)'},
              conteo:{type:'object',description:'Cantidad de fichas de cada numero visibles',
                properties:{'1':{type:'integer'},'2':{type:'integer'},'3':{type:'integer'},
                  '4':{type:'integer'},'5':{type:'integer'},'6':{type:'integer'},
                  '7':{type:'integer'},'8':{type:'integer'},'9':{type:'integer'},
                  '10':{type:'integer'},'11':{type:'integer'},'12':{type:'integer'},
                  '13':{type:'integer'},'comodin':{type:'integer'}}
              }
            },
            required:['limpias','sucias','conteo']
          }
        }],
        tool_choice:{type:'tool',name:'registrar_fichas'},
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mime,data:b64}},
          {type:'text',text:'Analiza esta foto de fichas de Burako. Cuenta cuantas fichas hay de cada numero (1-13) y comodines. Identifica canastas: PIERNA = 7+ fichas del mismo numero; ESCALERA = 7+ numeros consecutivos del mismo color. El numero 2 puede usarse como comodin. Registra usando la herramienta.'}
        ]}]
      })
    });

    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`Error ${res.status}`);}

    const data=await res.json();
    const toolResult=data.content?.find(c=>c.type==='tool_use');
    if(!toolResult?.input) throw new Error('Sin respuesta estructurada del modelo.');
    const parsed=toolResult.input;

    // Nosotros calculamos el total — no Claude
    const VALS={1:15,2:20,3:5,4:5,5:5,6:5,7:5,8:10,9:10,10:10,11:10,12:10,13:10,comodin:50};
    const conteo=parsed.conteo||{};
    const total=Object.entries(conteo).reduce((s,[k,qty])=>s+(VALS[k]||0)*(parseInt(qty)||0),0);
    if(total>0) S.form.fichas_en_juego=total;
    if(parsed.limpias!=null) S.form.limpias=Math.max(0,parseInt(parsed.limpias)||0);
    if(parsed.sucias!=null)  S.form.sucias=Math.max(0,parseInt(parsed.sucias)||0);
    const detalle=Object.entries(conteo).filter(([,q])=>parseInt(q)>0)
      .map(([k,q])=>`${q}×${k==='comodin'?'🃏':k}`).join(' ');
    S.photoNotes=detalle?`Detecté: ${detalle} = ${total} pts`:'';

    S.loading=false;S.error=null;render();
    setTimeout(()=>{
      const el=document.getElementById('fj');
      if(el){el.style.outline='2px solid #34d399';setTimeout(()=>el.style.outline='',1500);}
      preview();
    },50);

  }catch(err){
    S.loading=false;
    S.error=err.message||'Error desconocido.';
    render();
  }
}

// ══════════════════════════════════════
//  UTILS
// ══════════════════════════════════════
function on(id,fn){const e=document.getElementById(id);if(e)e.onclick=fn;}
function v(id){return document.getElementById(id)?.value?.trim()??'';}
function x(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pnames(){return Array.from(document.querySelectorAll('input[id]')).filter(e=>/^p\d+$/.test(e.id)).map(e=>e.value.trim());}

render();

// Register service worker for PWA / offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
